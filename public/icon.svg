<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep indigo → electric blue -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0f0c29"/>
      <stop offset="40%"  stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>

    <!-- Accent glow layer -->
    <radialGradient id="glow" cx="256" cy="240" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- Top shine -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Left page fill -->
    <linearGradient id="pageL" x1="86" y1="160" x2="252" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>

    <!-- Right page fill -->
    <linearGradient id="pageR" x1="426" y1="160" x2="260" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f5f0ff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>

    <!-- Cover/spine gradient -->
    <linearGradient id="coverGrad" x1="0" y1="0" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="50%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- ── Background ─────────────────────────────────────────── -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- ── Book drop shadow ───────────────────────────────────── -->
  <ellipse cx="256" cy="408" rx="148" ry="18" fill="#000000" fill-opacity="0.35"/>

  <!-- ── Left page ──────────────────────────────────────────── -->
  <!-- Shadow first -->
  <path d="M 104,176 L 248,164 L 248,372 L 104,384
           Q 88,384 88,368 L 88,192 Q 88,176 104,176 Z"
        fill="#000" fill-opacity="0.18" transform="translate(3,6)"/>
  <!-- Page face -->
  <path d="M 104,176 L 248,164 L 248,372 L 104,384
           Q 88,384 88,368 L 88,192 Q 88,176 104,176 Z"
        fill="url(#pageL)"/>

  <!-- ── Right page ─────────────────────────────────────────── -->
  <path d="M 264,164 L 408,176 Q 424,176 424,192 L 424,368
           Q 424,384 408,384 L 264,372 Z"
        fill="#000" fill-opacity="0.14" transform="translate(-3,6)"/>
  <path d="M 264,164 L 408,176 Q 424,176 424,192 L 424,368
           Q 424,384 408,384 L 264,372 Z"
        fill="url(#pageR)"/>

  <!-- ── Spine / cover strip ────────────────────────────────── -->
  <rect x="246" y="158" width="20" height="220" rx="4" fill="url(#coverGrad)"/>
  <!-- Spine highlight edge -->
  <rect x="246" y="158" width="6" height="220" rx="3" fill="white" fill-opacity="0.2"/>

  <!-- ── Book bottom (thickness) ───────────────────────────── -->
  <path d="M 90,378 L 248,367 L 248,388 L 90,400 Q 76,400 76,386 Q 76,378 90,378 Z"
        fill="#4338ca" fill-opacity="0.55"/>
  <path d="M 264,367 L 422,378 Q 436,378 436,386 Q 436,400 422,400 L 264,388 Z"
        fill="#5b21b6" fill-opacity="0.50"/>
  <!-- Bottom cover strip -->
  <path d="M 90,396 Q 76,398 76,410 Q 76,420 90,420 L 422,420 Q 436,420 436,410 Q 436,398 422,396 L 256,406 Z"
        fill="#4f46e5"/>

  <!-- ── Left page text lines ───────────────────────────────── -->
  <rect x="112" y="212" width="118" height="9"  rx="4.5" fill="#3730a3" fill-opacity="0.22"/>
  <rect x="112" y="237" width="96"  height="9"  rx="4.5" fill="#3730a3" fill-opacity="0.22"/>
  <rect x="112" y="262" width="122" height="9"  rx="4.5" fill="#3730a3" fill-opacity="0.22"/>
  <rect x="112" y="287" width="80"  height="9"  rx="4.5" fill="#3730a3" fill-opacity="0.22"/>
  <rect x="112" y="312" width="108" height="9"  rx="4.5" fill="#3730a3" fill-opacity="0.22"/>
  <rect x="112" y="337" width="66"  height="9"  rx="4.5" fill="#3730a3" fill-opacity="0.22"/>

  <!-- ── Right page text lines ──────────────────────────────── -->
  <rect x="282" y="212" width="118" height="9"  rx="4.5" fill="#4c1d95" fill-opacity="0.18"/>
  <rect x="282" y="237" width="92"  height="9"  rx="4.5" fill="#4c1d95" fill-opacity="0.18"/>
  <rect x="282" y="262" width="114" height="9"  rx="4.5" fill="#4c1d95" fill-opacity="0.18"/>
  <rect x="282" y="287" width="76"  height="9"  rx="4.5" fill="#4c1d95" fill-opacity="0.18"/>
  <rect x="282" y="312" width="104" height="9"  rx="4.5" fill="#4c1d95" fill-opacity="0.18"/>
  <rect x="282" y="337" width="60"  height="9"  rx="4.5" fill="#4c1d95" fill-opacity="0.18"/>

  <!-- ── Gold sparkle (top-right) ───────────────────────────── -->
  <g transform="translate(392,112)">
    <!-- 4-point star -->
    <path d="M0,-20 C1.5,-4 4,-1.5 20,0 C4,1.5 1.5,4 0,20 C-1.5,4 -4,1.5 -20,0 C-4,-1.5 -1.5,-4 0,-20 Z"
          fill="#fbbf24"/>
  </g>
  <!-- Smaller companion sparkles -->
  <g transform="translate(342,100)">
    <path d="M0,-11 C0.8,-2.2 2.2,-0.8 11,0 C2.2,0.8 0.8,2.2 0,11 C-0.8,2.2 -2.2,0.8 -11,0 C-2.2,-0.8 -0.8,-2.2 0,-11 Z"
          fill="#fcd34d" fill-opacity="0.75"/>
  </g>
  <circle cx="418" cy="152" r="5" fill="#fde68a" fill-opacity="0.65"/>
  <!-- Top-left accent dot -->
  <circle cx="122" cy="108" r="7" fill="#a5f3fc" fill-opacity="0.45"/>
  <circle cx="148" cy="95"  r="4" fill="#67e8f9" fill-opacity="0.35"/>
</svg>
